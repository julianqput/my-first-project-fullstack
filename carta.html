<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="carta.css">
    <title>Panel de Invitados - 15 Años</title>
    <style>
        body { font-family: sans-serif; background: #fdf2f4; padding: 20px; text-align: center; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #D4AF37; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .result { margin-top: 20px; padding: 10px; border: 1px dashed #D4AF37; display: none; word-break: break-all; }
        a { color: #25D366; font-weight: bold; text-decoration: none; display: block; margin-top: 10px; }
    </style>
</head>

<body>

    <div class="box">
        <h2>Generador de Invitaciones</h2>
        <p>Escribe el nombre de la familia o invitado:</p>
        <input type="text" id="nombreInvitado" placeholder="Ej: Familia Quesada pinzon">
        <button onclick="generarLink()">Generar Invitación</button>

        <div id="resultado" class="result">
            <p>Link para enviar:</p>
            <span id="linkFinal"></span>
            <a id="btnWhatsApp" target="_blank">📲 Enviar por WhatsApp</a>
        </div>
    </div>

    <script>
        function generarLink() {
            const nombre = document.getElementById('nombreInvitado').value;
            if (!nombre) return alert("Escribe un nombre");

            // TU URL BASE (Asegúrate de que sea esta)
            const urlBase = "https://julianqput.github.io/my-first-project-fullstack/index.html";
            
            // Creamos el link personalizado
            const link = `${urlBase}?guest=${encodeURIComponent(nombre)}`;
            
            // Mostrar resultado
            document.getElementById('resultado').style.display = 'block';
            document.getElementById('linkFinal').innerText = link;
            
            // Configurar mensaje de WhatsApp
            const mensaje = encodeURIComponent(`¡Hola! Te compartimos nuestra invitación especial para los 15 años de Raquel. ¡Te esperamos! ✨\n\nMira la invitación aquí: ${link}`);
            document.getElementById('btnWhatsApp').href = `https://wa.me/?text=${mensaje}`;
        }
    </script>
    <script src="carta.js"></script>
</body>
</html>
