<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis 15 Años - Invitación Especial</title>
    <link rel="stylesheet" href="carta.css">
</head>
<body>
    <div class="container animated">
        <header>
            <h1>Mis XV Años</h1>
            <p class="bienvenida">¡Estás cordialmente invitado/a,</p>
            <h2 id="guest-name">Invitado Especial</h2>
            <p>a compartir este día mágico conmigo!</p>
        </header>

        <div class="photo-frame animated">
            <img src="foto.jpg" alt="Quinceañera" id="mainPhoto">
        </div>

        <section class="details">
            <div class="info-card animated">
                <span class="icon">📅</span>
                <h3>Fecha</h3>
                <p>Miércoles, 24 de Junio</p>
            </div>
            <div class="info-card animated">
                <span class="icon">⏰</span>
                <h3>Hora</h3>
                <p>8:00 PM</p>
            </div>
            <div class="info-card animated">
                <span class="icon">📍</span>
                <h3>Lugar</h3>
                <p>Finca el Páramo Morella</p>
                <a href="https://maps.google.com" target="_blank" class="btn-mapa">VER MAPA</a>
            </div>
        </section>

        <footer class="animated">
            <h3>Confirmar Asistencia</h3>
            <p>Por favor, confirma antes del 10 de Junio. 💖</p>
            <a href="#" id="whatsapp-btn" class="btn-confirm">CONFIRMAR ASISTENCIA (WhatsApp)</a>
        </footer>
    </div>

    <script src="carta.js"></script>
</body>
</html>
