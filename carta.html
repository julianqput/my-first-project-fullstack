<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis 15 Años - Julieth Quesada</title>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <header class="hero animated">
            <h1 class="main-title">Julieth</h1>
            <p class="subtitle">QUINCEAÑERA</p>
        </header>

        <section class="photo-section animated">
            <div class="elegant-borders">
                <div class="gold-frame frame-1"></div>
                <div class="gold-frame frame-2"></div>
                <img src="foto.jpg" alt="La Quinceañera" class="quince-photo">
            </div>
        </section>

        <section class="welcome-section animated">
            <p>¡Estás cordialmente invitado/a,</p>
            <h2 id="guest-name">Querido Invitado</h2>
            <p>a compartir este día mágico conmigo!</p>
        </section>

        <section class="info-section animated">
            <h3 class="details-title">Detalles del Evento</h3>
            <div class="info-grid">
                <div class="card">
                    <span class="icon">📅</span>
                    <h3>Fecha</h3>
                    <p>Miércoles, 24 de Junio</p>
                </div>
                <div class="card">
                    <span class="icon">⏰</span>
                    <h3>Hora Recepción</h3>
                    <p>8:00 PM</p>
                </div>
                <div class="card">
                    <span class="icon">📍</span>
                    <h3>Lugar</h3>
                    <p>Finca el Páramo Morella</p>
                </div>
                <div class="card">
                    <span class="icon">👗</span>
                    <h3>Vestimenta</h3>
                    <p>Formal</p>
                </div>
            </div>
        </section>

        <footer class="rsvp-section animated">
            <a id="whatsapp-btn" href="#" target="_blank" class="rsvp-btn">
                Confirmar Asistencia (WhatsApp)
            </a>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
