<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para mi persona favorita 🌻</title>
    <link rel="stylesheet" href="flores.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>
    <div id="garden"></div>

    <div class="main-container">
        <div class="envelope-wrapper" id="envelope">
            <div class="envelope">
                <div class="letter">
                    <div class="text">
                        <strong>Para el petalito,</strong>
                        <p>Así como estas flores amarillas buscan siempre el sol, yo siempre busco tu sonrisa. Eres mi luz y mi lugar favorito en el mundo. ❤️</p>
                    </div>
                </div>
            </div>
            <div class="heart"></div>
        </div>
        <button id="bloom-btn">Haz florecer nuestro amor</button>
    </div>

    <script src="flores.js"></script>
</body>
</html>
